<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mathesis — exact math notebook in your browser</title>
    <meta
      name="description"
      content="A free, client-side Mathematica-style notebook: exact arbitrary-precision arithmetic, equation solving, number theory, plotting, and more — computed in your browser with pure-Rust WebAssembly. No server, no sign-up."
    />
    <meta
      name="keywords"
      content="computational notebook, Mathematica alternative, exact arithmetic, arbitrary precision, symbolic math, equation solver, WebAssembly, Rust, number theory, elliptic curves, in-browser calculator"
    />
    <meta name="author" content="Mark Karpelès" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0e1915" />
    <meta name="color-scheme" content="dark" />
    <link rel="canonical" href="https://karpeleslab.github.io/mathesis/" />
    <link rel="icon" type="image/svg+xml" href="/mathesis/favicon.svg" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mathesis" />
    <meta property="og:title" content="Mathesis — exact math notebook in your browser" />
    <meta
      property="og:description"
      content="A free, client-side Mathematica-style notebook: exact arbitrary-precision arithmetic, solving, number theory, and plotting — all computed in your browser via pure-Rust WebAssembly."
    />
    <meta property="og:url" content="https://karpeleslab.github.io/mathesis/" />
    <meta property="og:image" content="https://karpeleslab.github.io/mathesis/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Mathesis — exact mathematics, in your browser" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="ja_JP" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mathesis — exact math notebook in your browser" />
    <meta
      name="twitter:description"
      content="A free, client-side Mathematica-style notebook: exact math, solving, and plotting — computed in your browser via pure-Rust WebAssembly."
    />
    <meta name="twitter:image" content="https://karpeleslab.github.io/mathesis/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Mathesis",
        "url": "https://karpeleslab.github.io/mathesis/",
        "description": "A free, client-side Mathematica-style computational notebook: exact arbitrary-precision arithmetic, equation solving, number theory, and plotting, computed entirely in the browser with pure-Rust engines compiled to WebAssembly.",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any (modern web browser)",
        "browserRequirements": "Requires JavaScript and WebAssembly",
        "inLanguage": ["en", "fr", "ja"],
        "isAccessibleForFree": true,
        "author": { "@type": "Person", "name": "Mark Karpelès" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>

    <!-- Crawler / no-JavaScript fallback: the app is a WebAssembly SPA, so
         without this the page body would be empty for bots and no-JS users. -->
    <noscript>
      <main style="max-width: 40rem; margin: 4rem auto; padding: 0 1.5rem; font-family: Georgia, 'Times New Roman', serif; color: #ece7da; background: #0e1915;">
        <h1 style="color: #e7b85c;">Mathesis — exact mathematics, in your browser</h1>
        <p>
          Mathesis is a free, client-side computational notebook in the style of
          Mathematica. Type an expression in Wolfram-style syntax and get an
          <strong>exact</strong> answer, computed on your own machine — no server.
        </p>
        <ul>
          <li>Exact arbitrary-precision integers and rationals (<code>2^128</code>, <code>1/3 + 1/3 + 1/3</code>).</li>
          <li>Symbolic constants and irrationals kept exact (<code>Pi</code>, <code>Sqrt[2]</code>), with decimals alongside.</li>
          <li>Number theory, combinatorics, linear algebra, and elliptic curves.</li>
          <li>Equation solving and logic over an SMT engine; 2D and 3D plotting.</li>
          <li>Powered by pure-Rust engines (puremp, z3rs) compiled to WebAssembly.</li>
        </ul>
        <p><strong>Please enable JavaScript to use the notebook.</strong></p>
      </main>
    </noscript>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
